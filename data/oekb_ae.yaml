# OeKB Steuerliche Mitteilungen — curated dataset for common Meldefonds.
#
# Source: my.oekb.at (authenticated SPA — no public API for AE/WA figures).
# All values MUST be manually verified on my.oekb.at before filing.
# Entries marked PLACEHOLDER need to be filled in from the fund's Meldung.
#
# ─── Field reference ───────────────────────────────────────────────────────
# ae_per_share       Ausschüttungsgleiche Erträge per unit, in fund currency.
#                    For ausschüttend: additional undistributed income beyond
#                    what was distributed (often 0 or small).
#                    For thesaurierend: ALL fund income (dividends + interest
#                    + intra-fund realized gains earned in the fiscal year).
#
# wa_per_share       Withhaltungsabzug per unit — foreign taxes already
#                    withheld within the fund on the AE. Reduces KeSt due.
#                    (e.g. US dividends withheld at 15% inside an Irish ETF)
#
# ak_korrektur_per_share
#                    Anschaffungskosten-Korrektur per unit in EUR.
#                    Positive = cost basis increases (prevents double-tax on sale).
#                    Negative = cost basis decreases (distributing funds where
#                    distributions exceeded AE; excess returned as tax-neutral).
#                    NOTE: this field is in EUR, not fund currency.
#
# meldedatum         Date OeKB received the fund's fiscal-year tax report.
#                    Shares held ON this date determine the tax obligation.
#                    May differ from calendar Dec 31 (Irish funds often report
#                    Jan/Feb for the prior year).
#
# domicile           ISIN country prefix determines KZ routing on E1kv:
#                    AT-prefix → KZ 936 (inländisch)
#                    All others (IE, LU, …) → KZ 937 (ausländisch)
#
# ertragsverwendung  ausschüttend or thesaurierend. Tax treatment is the SAME
#                    (same KZ 936/937); the difference is whether distributions
#                    have already been taxed via the broker (KZ 898) separately.
# ─────────────────────────────────────────────────────────────────────────────
#
# How to look up values on my.oekb.at:
#   1. Go to https://my.oekb.at → Steuerdaten → Fonds-Steuerdaten
#   2. Search by ISIN
#   3. Find the Meldung for the relevant fiscal year
#   4. Download "Steuerliche Mitteilung" PDF — AE/WA/AK-Korrektur are on page 1
#   5. Enter per-share figures here under the calendar year the meldedatum falls in
#
# OeKB Meldefonds registry (no auth, ISIN validation only):
#   https://my.oekb.at/kms-reporting/public?report=steuerdaten-liste-mf-gesamt&format=CSV

