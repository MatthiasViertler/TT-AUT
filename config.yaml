# Kapitalertrag — user configuration
# Copy this file to config.yaml and edit as needed.
# All values here override the built-in defaults in core/config.py.

# Austrian KESt rate (27.5% as of 2016)
kest_rate: 0.275

# FX source: "ecb" (default, free, no API key) or "manual"
fx_source: ecb
fx_cache_dir: ./data/fx_cache

# FX method: "daily" (Austrian law = ECB rate on transaction date)
fx_method: daily

# Max WHT creditable against Austrian KESt (§ 27a EStG)
max_creditable_wht: 0.15

# Treaty withholding tax rates by country.
# Only override if you know a specific rate applies to your situation.
# wht_treaty_rates:
#   US: 0.15
#   DE: 0.15

# Output options: set to false to skip generating that file type
output:
  excel: true
  csv: true
  tax_summary: true
  html: true
  console: true

# Freedom Dashboard — projection slider defaults
# Override portfolio_eur in config.local.yaml with your actual portfolio value
freedom_dashboard:
  portfolio_eur: 10000                # actual portfolio value — override in config.local.yaml
  monthly_expenses_eur: 2000          # target monthly spending in retirement
  monthly_contribution_eur: 500       # how much you add to the portfolio per month
  yield_pct: 3.0                      # expected dividend yield %
  growth_pct: 7.0                     # expected annual portfolio growth %

# Nichtmeldefonds — funds NOT registered with OeKB (US REITs, BDCs, foreign ETFs).
# Tax: 27.5% on max(90% × annual price gain, 10% × Dec31 price) per share.
# Shares held are inferred from transaction history automatically.
# dec31_prices: closing price on Dec 31 in fund's native currency.
#   → Look up in IBKR portfolio statement or finance.yahoo.com (Historical Data, Dec 31)
#   → Prior year's Dec 31 price = Jan 1 of the current year
#
# nichtmeldefonds:
#   - symbol: O
#     isin: US7561091049
#     name: Realty Income Corp
#     type: REIT         # REIT | BDC | FUND
#     currency: USD
#     dec31_prices:
#       2022: 64.05
#       2023: 52.85
#       2024: 53.45
#       2025: 56.20

# Account ID → person name mapping (used to auto-detect --person from broker exports)
# Find your account ID in the BOF row of any IB Flex Query export
# For other brokers it will be parsed similarly once those parsers are added
account_map:
  U11111111: Jessie      # replace with your account ID (BOF row of any Flex Query export)
  U22222222: Matthias    # replace with your account ID
  # S12345678: Matthias      # SAXO account ID (when SAXO parser is added)
