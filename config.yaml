# Kapitalertrag — universal configuration
# Committed to git. Contains only settings that apply to ALL users.
# Person-specific overrides go in users/{person}/config.local.yaml (gitignored).

# Austrian KESt rate (27.5% as of 2016)
kest_rate: 0.275

# FX source: "ecb" (default, free, no API key) or "manual"
fx_source: ecb
fx_cache_dir: ./cache/fx_cache
price_cache_dir: ./cache/price_cache

# FX method: "daily" (Austrian law = ECB rate on transaction date)
fx_method: daily

# Max WHT creditable against Austrian KeSt (§ 27a EStG)
max_creditable_wht: 0.15

# Treaty withholding tax rates by country.
# Only override if you know a specific rate applies to your situation.
# wht_treaty_rates:
#   US: 0.15
#   DE: 0.15

# Output options: set to false to skip generating that file type
output:
  excel: true
  csv: true
  tax_summary: true
  html: true
  anv_checklist: true
  console: true

# Freedom Dashboard — projection slider defaults
freedom_dashboard:
  monthly_expenses_eur: 2000          # target monthly spending in retirement
  monthly_contribution_eur: 500       # how much you add to the portfolio per month
  yield_pct: 3.0                      # expected dividend yield %
  growth_pct: 7.0                     # expected annual portfolio growth %
  # portfolio_eur: 10000              # override in users/{person}/config.local.yaml
  # holdings_sort: value              # value | yield | alpha (default: value)
  # holdings_group_by_type: false     # group holdings by Stock/ETF/REIT/BDC (default: false)

# Meldefonds — funds registered with OeKB (most UCITS ETFs: IE/LU domicile, AT funds).
# AE and WA figures are sourced from the curated dataset in data/oekb_ae.yaml.
# AE (Ausschüttungsgleiche Erträge): taxable income equivalent, even if not distributed.
# WA (Withhaltungsabzug): fund-internal foreign tax credit, reduces KeSt due.
# KZ routing: AT-prefix ISIN → KZ 936; all others (IE, LU, …) → KZ 937.
# Tax treatment is IDENTICAL for ausschüttend and thesaurierend — both file AE via KZ 937.
# For ausschüttend: distributions are separately taxed via broker (KZ 898); AE = additional
#   undistributed income (may be 0 for many years, e.g. VWRL 2024).
# For thesaurierend: ALL fund income is AE (no cash distribution) — declare annually.
# ⚠ Verify AE/WA per-share values on my.oekb.at before filing. PLACEHOLDER entries in
#   data/oekb_ae.yaml must be filled in for the tool to compute actual KeSt.
#
# meldefonds_data_file: ./data/oekb_ae.yaml   # default path (committed, not gitignored)
#
# Set per-person in users/{person}/config.local.yaml:
# meldefonds:
#   - isin: IE00B3RBWM25   # VWRL — looks up AE/WA from data/oekb_ae.yaml automatically
#     symbol: VWRL          # ticker as it appears in your broker export (for share count)
#   - isin: IE00BK5BQT80   # VWCE accumulating
#     symbol: VWCE

# Nichtmeldefonds — funds NOT registered with OeKB (US REITs, BDCs, foreign ETFs).
# Tax: 27.5% on max(90% × annual price gain, 10% × Dec31 price) per share.
# Shares held are inferred from transaction history automatically.
# Year-end prices are fetched automatically from Yahoo Finance (no manual lookup needed).
# Results cached in cache/price_cache/ — delete the cache to force a refresh.
#
# Set per-person in users/{person}/config.local.yaml:
# nichtmeldefonds:
#   - symbol: O               # ticker symbol as on Yahoo Finance (required)
#     isin: US7561091049      # ISIN (optional, for output only)
#     name: Realty Income Corp  # display name (optional)
#     type: REIT              # REIT | BDC | FUND
#     currency: USD           # native currency of the fund

# Symbol aliases for corporate actions (tender offers, mergers) where the broker
# assigns a new temporary ticker/ISIN for the sell event.
# Maps sell-symbol → buy-symbol for FIFO matching.
# Set per-person in users/{person}/config.local.yaml:
# symbol_aliases:
#   NEWTICKER: OLDTICKER    # e.g. bought as OLDTICKER, sold as NEWTICKER

# Manual cost basis for positions with no buy record
# (spin-offs, positions transferred from another broker, inherited shares).
# cost_eur = total cost basis in EUR for all shares (not per-share).
# Set per-person in users/{person}/config.local.yaml:
# manual_cost_basis:
#   - symbol: SOLV
#     isin: US83444M1018
#     purchase_date: 2024-04-01
#     quantity: 1             # qty=1 convention (see CLAUDE.md)
#     cost_eur: 0.00

# Austrian residency start year for WHT reclaim report.
# Set per-person in users/{person}/config.local.yaml:
# at_residency_start_year: 2024

# Arbeitnehmerveranlagung (L1) checklist — set per-person in config.local.yaml.
# Only generates output if this section is present.
# anv:
#   home_office_days: 0           # days worked from home (€3/day Pauschale, max 100 days)
#   home_office_equipment_eur: 0  # home-office furniture/equipment purchases (max €300)
#   commute_km: 0                 # one-way commute distance in km (0 = no commute / no PP)
#   commute_type: public          # "public" (Kleines Pendlerpauschale) or "car" (Großes)
#   commute_days_per_year: 220    # days actually commuting (PP requires >50% of workdays)
#   kirchenbeitrag_eur: 0         # church tax paid (deductible up to €400)
#   donations_eur: 0              # donations to BMF-approved Spendenempfänger
#   tax_advisor_eur: 0            # tax advisor / accountant fees (fully deductible)
#   union_fees_eur: 0             # Gewerkschaftsbeitrag
#   training_eur: 0               # Fortbildungskosten (professional development)
#   professional_books_eur: 0     # Fachliteratur (professional books / subscriptions)
#   work_equipment_eur: 0         # Arbeitsmittel (laptop, monitor, desk — home office)
#   family_bonus_children: 0      # children under 18 (Familienbonus Plus: €2,000/child)
#   prior_year_income_eur: 0      # prior year gross income (donation limit = 10%)

# IBKR Flex Web Service auto-fetch — set per-person in config.local.yaml.
# Allows downloading the Activity Statement directly from IBKR without manual CSV export.
# token:    IB Client Portal → Settings → Flex Web Service → Manage Service Tokens
# query_id: Reports → Flex Queries → (open your query) → the numeric ID in the URL
# Usage: python main.py --person matthias --year 2025 --fetch-ibkr
#        python main.py --person matthias --year 2025 --force-fetch-ibkr  (re-download)
# Saves report to users/{person}/data/IB/{person}_ibkr_flex.csv (picked up automatically).
#
# ibkr_flex:
#   token: "your_flex_token_here"
#   query_id: 123456

# Account ID → person mapping is now automatic.
# Each person's account_id is declared in users/{person}/config.local.yaml.
# account_id may be a scalar string or a list (for multi-broker / migrated accounts):
#
# users/matthias/config.local.yaml:
#   account_id:
#     - U99999999    # IB account
#     - "19999999"   # SAXO DK account
#
# users/jessie/config.local.yaml:
#   account_id: U88888888
